<!DOCTYPE html>
<html>
<head> 
<meta charset="utf-8"> 
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<title>新規登録</title> 
<link rel="stylesheet" href="register.css"></head>
<body> 
    <div class="wrapper"> 
        <div class="ground">
        <div class="header">新規登録</div>
            <div class="center">
                <div class="main">
                <ul>
                    <label for="name">名前</label><br>
                    <input class="name" type="text" name="name" value="" size="20" placeholder="山田太郎"><br>

                    <label for="id">ユーザーID</label><br>
                    <input class="id" type="text" name="id" value="" size="20" placeholder="1234"><br>

                    <label for="pass">パスワード</label><br>
                    <input class="pass" type="password" name="pass" value="" size="20" placeholder="〜8文字で入力"><br>

                    <label for="password">再度パスワード入力</label><br>
                    <input class="password" type="password" name="pass" value="" size="20" placeholder="〜8文字で入力"><br>
                    <br>
                    
                    <input type="submit" value="新規登録" class="footer">
                </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
